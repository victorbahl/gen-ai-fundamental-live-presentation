# Netlify deploy config for the GenAI Fundamentals Slidev deck.
# Replaces the old GitHub Pages workflow: Netlify serves the static build
# AND runs the serverless functions that relay live-battle events to AnyCable.
#
# Required env vars (set in Netlify dashboard > Site settings > Environment variables,
# NEVER in code):
#   ANYCABLE_BROADCAST_URL  — AnyCable HTTP broadcast endpoint (from AnyCable Plus dashboard)
#   ANYCABLE_BROADCAST_KEY  — AnyCable broadcast key (if your app requires one)

[build]
  # Slidev builds to ./dist. No --base sub-path: served at the site root on Netlify.
  # This runs automatically on every push to `main` (the site is linked to the
  # GitHub repo; see README "Deploy"). Manual `netlify deploy` still works too.
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# NB: there is no local-functions workflow. `npm run dev` serves the SLIDES only
# (the live battle's serverless functions 404 locally, so votes can't relay).
# To test the battle end-to-end, push to `main` — Netlify auto-deploys and the
# functions run there. See CLAUDE.md "RUN LOCALLY" / "DEPLOY".

# Battle audience page (public/battle.html) is a real static file; everything
# else falls back to the Slidev SPA.
[[redirects]]
  from = "/battle.html"
  to = "/battle.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
